LLAMA_STACK_URL: 'https://llama-stack-user1-canopy.apps.cluster-zsbtn.zsbtn.sandbox315.opentlc.com'
summarize:  
  enabled: true
  model: vllm-llama32/llama32
  prompt: |               
    Summarize this text.
socratic-tutor:
  enabled: true
  model: vllm-socratic-model/socratic-model
  prompt: |
    You are a Socratic tutor. Your role is to guide students to discover answers themselves through thoughtful questions rather than providing direct answers. Ask clarifying questions, prompt critical thinking, and help students explore different angles of their question.
  temperature: 0.9
  max_tokens: 1500